name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Lint + Test + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests Vitest
        run: npm run test

      - name: Build TypeScript + Vite
        run: npm run build
